name: Terraform management
on:
  workflow_call: {}
jobs:
  tflint:
    name: tflint
    runs-on: ubuntu-latest
    steps:
      - if: ${{ startsWith(github.repository, 'GeoNet/') == false }}
        name: require GeoNet org
        run: |
          exit 1
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        name: Cache plugin dir
        with:
          path: ~/.tflint.d/plugins
          key: tflint-${{ hashFiles('.tflint.hcl') }}
      - uses: GeoNet/terraform-linters-setup-tflint@07d1d6c7d9bb58ace1a3a6620c6d324905931dfe # master
        name: Setup TFLint
        with:
          tflint_version: v0.63.1
      - name: Init TFLint
        run: tflint --init
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - name: Run TFLint
        run: tflint -f compact
  terraform:
    name: Terraform
    runs-on: ubuntu-latest
    steps:
      - if: ${{ startsWith(github.repository, 'GeoNet/') == false }}
        name: require GeoNet org
        run: |
          exit 1
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_wrapper: false # don't absorb exitcode, propigate it naturally
      - name: Terraform Init
        run: terraform init
      - name: Terraform Format
        id: format
        run: terraform fmt -check -diff=true -recursive
      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color
