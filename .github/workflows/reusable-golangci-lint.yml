name: reusable golangci lint
on:
  workflow_call:
    inputs:
      config:
        type: string
        required: false
        description: |
          a .golangci.yml configuration file.
          Warning: setting this field will override an existing config
      setup:
        required: false
        type: string
        description: |
          shell commands to setup the test environment
      go-version:
        default: oldstable
        type: string
        description: |
          Go version to use, see `actions/setup-go` for more information.
jobs:
  golangci:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - if: ${{ startsWith(github.repository, 'GeoNet/') == false }}
        name: require GeoNet org
        run: |
          exit 1
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ inputs.go-version }}
          cache-dependency-path: go.sum
          check-latest: true
      - name: write .golangci.yml
        if: ${{ inputs.config }}
        run: |
          echo "Using config:"
          echo '${{ inputs.config }}' | tee .golangci.yml
      - name: setup
        run: |
          eval '${{ inputs.setup }}'
      - name: golangci-lint
        uses: GeoNet/golangci-lint-action@e72a236d1230b954a09c29ea7df2087d8e8795a0 # main
        with:
          version: v2.11.3
          args: --timeout 30m -E gosec
