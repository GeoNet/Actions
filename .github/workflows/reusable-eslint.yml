name: reusable eslint
on:
  workflow_call:
    inputs:
      paths:
        required: true
        type: string
        description: |
          A list of root directory/s to where a package.json and eslint
          configuration file (eslint.config.mjs) exist.
          e.g.: my/root/one my/cool/root/two
      node-version:
        required: false
        type: string
        default: "21.x"
        description: |
          The version of Node to use when installing node modules and
          running eslint.
          See https://github.com/actions/setup-node?tab=readme-ov-file#supported-version-syntax
          for syntax.
jobs:
  eslint:
    runs-on: ubuntu-latest
    steps:
      - if: ${{ startsWith(github.repository, 'GeoNet/') == false }}
        name: require GeoNet org
        run: |
          exit 1
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ inputs.node-version }}
      - name: Enable Corepack
        run: |
          corepack enable
      - name: Install Node modules
        id: install-node-modules
        env:
          PATHS: ${{ inputs.paths }}
        run: |
          set -euo pipefail
      
          for path in $PATHS; do
            if [ -f "$path/pnpm-lock.yaml" ]; then
              echo "Using pnpm ($path)"
              (
                cd $path
                pnpm install --frozen-lockfile              
              )
            else
              echo "Using npm ($path)"
              npm install-clean --prefix $path
            fi
          done
      - name: Run ESLint
        id: eslint
        env:
          PATHS: ${{ inputs.paths }}
        run: |
          set -euo pipefail
      
          for path in $PATHS; do
            if [ -f "$path/pnpm-lock.yaml" ]; then
              echo "Using eslint with pnpm ($path)"
              (
                cd $path
                ESLINT_USE_FLAT_CONFIG=true pnpm exec eslint -c eslint.config.mjs .
              )
            else
              echo "Using eslint with npm ($path)"
              ESLINT_USE_FLAT_CONFIG=true $path/node_modules/.bin/eslint -c $path/eslint.config.mjs $path
            fi
          done
