name: check actions exist
on:
  pull_request: {}
  workflow_dispatch: {}
jobs:
  check-actions-exist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: run check-actions-exist.sh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ./hack/check-actions-exist.sh
